name: flutter_06_sqlite_marafo_melbert
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path: ^1.9.0
  sqflite_common_ffi: ^2.3.4+4
  english_words: ^4.0.0
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: BalooFont
      fonts:
        - asset: assets/fonts/BalooDa2-VariableFont_wght.ttf 
    - family: SigmarFont
      fonts:
        - asset: assets/fonts/Sigmar-Regular.ttf